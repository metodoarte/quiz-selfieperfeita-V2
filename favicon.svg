<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fundo arredondado escuro -->
  <rect width="32" height="32" rx="7" fill="#1a1a2e"/>

  <!-- Corpo do celular -->
  <rect x="10" y="6" width="12" height="20" rx="2.5" fill="none" stroke="#F5C518" stroke-width="1.5"/>

  <!-- Tela do celular -->
  <rect x="11.5" y="8.5" width="9" height="13" rx="1" fill="#F5C518" opacity="0.15"/>

  <!-- Câmera frontal (bolinha no topo) -->
  <circle cx="16" cy="7.8" r="0.9" fill="#F5C518"/>

  <!-- Estrelinhas de brilho -->
  <circle cx="8" cy="9" r="0.7" fill="#F5C518" opacity="0.7"/>
  <circle cx="24" cy="12" r="0.5" fill="#F5C518" opacity="0.5"/>
  <circle cx="7" cy="16" r="0.4" fill="#F5C518" opacity="0.4"/>
  <circle cx="25" cy="20" r="0.6" fill="#F5C518" opacity="0.6"/>
</svg>
